<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Single File Edition</title>
    <style>
        body {
            background-color: #faf8ef;
            color: #776e65;
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
        }

        /* Homepage Layout Styles */
        .info-container {
            width: 340px;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .instructions {
            font-size: 14px;
            color: #776e65;
            background: #eee4da;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        /* Original Game Styles */
        .heading {
            display: flex;
            width: 340px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        h1 { font-size: 50px; font-weight: bold; margin: 0; }
        .score-container {
            background: #bbada0;
            padding: 5px 15px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border-radius: 3px;
            text-align: center;
        }
        .score-label { display: block; font-size: 10px; color: #eee4da; text-transform: uppercase; }
        
        #game-container {
            width: 340px;
            height: 340px;
            background: #bbada0;
            border-radius: 6px;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
            touch-action: none;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            width: 100%;
            height: 100%;
        }
        .cell { background: rgba(238, 228, 218, 0.35); border-radius: 3px; }
        .tile {
            width: 72.5px;
            height: 72.5px;
            border-radius: 3px;
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            line-height: 72.5px;
            text-align: center;
            transition: all 0.1s ease-in-out;
        }
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 24px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 24px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 24px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 18px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 18px; }
        
        #game-over {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
        #game-over p { font-size: 40px; font-weight: bold; margin-bottom: 20px; }
        #restart-btn {
            background: #8f7a66;
            color: #f9f6f2;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="info-container">
        <h1>2048</h1>
        <div class="instructions">
            Join the numbers to get to the <strong>2048</strong> tile!
            <br>Use arrow keys or swipe to move.
        </div>
    </div>

    <div class="heading">
        <div class="score-container"><span class="score-label">Score</span><span id="score">0</span></div>
    </div>

    <div id="game-container">
        <div class="grid">
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>
        <div id="tiles"></div>
        <div id="game-over">
            <p>Game Over!</p>
            <button id="restart-btn" onclick="resetGame()">Try again</button>
        </div>
    </div>

    <script>
        let board = Array(16).fill(0);
        let score = 0;
        const size = 4;
        const padding = 10;
        const cellSize = 72.5;

        function init() {
            board.fill(0);
            score = 0;
            document.getElementById("game-over").style.display = "none";
            addTile();
            addTile();
            updateDOM();
        }

        function addTile() {
            let empties = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if (empties.length > 0) {
                let idx = empties[Math.floor(Math.random() * empties.length)];
                board[idx] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateDOM() {
            document.getElementById("score").innerText = score;
            const container = document.getElementById("tiles");
            container.innerHTML = "";
            board.forEach((val, idx) => {
                if (val > 0) {
                    const tile = document.createElement("div");
                    tile.className = `tile tile-${val}`;
                    tile.innerText = val;
                    let r = Math.floor(idx / size);
                    let c = idx % size;
                    tile.style.top = `${padding + r * (cellSize + padding)}px`;
                    tile.style.left = `${padding + c * (cellSize + padding)}px`;
                    container.appendChild(tile);
                }
            });
        }

        function slide(row) {
            let arr = row.filter(val => val);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr.splice(i + 1, 1);
                }
            }
            while (arr.length < size) arr.push(0);
            return arr;
        }

        function move(dir) {
            let moved = false;
            let prevBoard = [...board];
            for (let i = 0; i < size; i++) {
                let row = [];
                for (let j = 0; j < size; j++) {
                    if (dir === 'left') row.push(board[i * size + j]);
                    if (dir === 'right') row.push(board[i * size + (size - 1 - j)]);
                    if (dir === 'up') row.push(board[j * size + i]);
                    if (dir === 'down') row.push(board[(size - 1 - j) * size + i]);
                }
                let newRow = slide(row);
                for (let j = 0; j < size; j++) {
                    if (dir === 'left') board[i * size + j] = newRow[j];
                    if (dir === 'right') board[i * size + (size - 1 - j)] = newRow[j];
                    if (dir === 'up') board[j * size + i] = newRow[j];
                    if (dir === 'down') board[(size - 1 - j) * size + i] = newRow[j];
                }
            }
            if (board.some((v, i) => v !== prevBoard[i])) {
                addTile();
                updateDOM();
                checkGameOver();
            }
        }

        function checkGameOver() {
            if (board.includes(0)) return;
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size; j++) {
                    let idx = i * size + j;
                    if (j < size - 1 && board[idx] === board[idx + 1]) return;
                    if (i < size - 1 && board[idx] === board[idx + size]) return;
                }
            }
            document.getElementById("game-over").style.display = "flex";
        }

        function resetGame() {
            init();
        }

        window.addEventListener("keydown", e => {
            if (e.key === "ArrowLeft") move("left");
            if (e.key === "ArrowRight") move("right");
            if (e.key === "ArrowUp") move("up");
            if (e.key === "ArrowDown") move("down");
        });

        // Touch support for mobile
        let touchStartClientX, touchStartClientY;
        const container = document.getElementById("game-container");
        container.addEventListener("touchstart", e => {
            touchStartClientX = e.touches[0].clientX;
            touchStartClientY = e.touches[0].clientY;
        });
        container.addEventListener("touchend", e => {
            if (!touchStartClientX || !touchStartClientY) return;
            let dx = e.changedTouches[0].clientX - touchStartClientX;
            let dy = e.changedTouches[0].clientY - touchStartClientY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) move(dx > 0 ? "right" : "left");
            } else {
                if (Math.abs(dy) > 30) move(dy > 0 ? "down" : "up");
            }
        });

        init();
    </script>
</body>
</html>
